[project]
name = "black-scholes-api"
version = "1.0.0"
description = "Numerical methods for option pricing — MATH499"
authors = [{ name = "Joseph Kamau Maina", email = "SJOSKA2211@users.noreply.github.com" }]
dependencies = [
    "fastapi>=0.100.0",
    "uvicorn[standard]>=0.22.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "supabase>=1.0.0",
    "structlog>=23.1.0",
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "pandas>=2.0.0",
    "openpyxl>=3.1.0",
    "resend>=0.6.0",
    "python-multipart>=0.0.6",
    "ddtrace>=1.15.0",
    "datadog>=0.45.0",
    "playwright>=1.35.0",
    "joblib>=1.3.0",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "httpx>=0.24.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"

[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 88
