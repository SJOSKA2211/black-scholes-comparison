global:
  scrape_interval:     15s   # How often Prometheus polls /metrics
  evaluation_interval: 15s   # How often alerting rules are evaluated
  scrape_timeout:      10s
 
rule_files:
  - /etc/prometheus/rules/*.yml   # Alert rule files (mounted as volume)
 
scrape_configs:
 
  # ── FastAPI backend ─────────────────────────────────────────────
  - job_name: "black-scholes-api"
    static_configs:
      - targets: ["api:8000"]  # Container name, internal Docker network
    metrics_path: /metrics
    scrape_interval: 15s
 
  # ── Next.js frontend ─────────────────────────────────────────────
  - job_name: "black-scholes-web"
    static_configs:
      - targets: ["10.15.147.155:3000"]
    metrics_path: /api/metrics
    scrape_interval: 15s

  # ── Prometheus self-monitoring ───────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
