worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;
 
events { worker_connections 1024; }
 
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Premium Compression (Section 1.2)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 9;  # Maximum compression for production
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types 
        text/plain 
        text/css 
        application/json 
        application/javascript 
        text/xml 
        application/xml 
        application/xml+rss 
        text/javascript 
        application/vnd.ms-fontobject 
        application/x-font-ttf 
        font/opentype 
        image/svg+xml 
        image/x-icon;

 
    # Rate limiting — prevents scraper and API abuse
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=ws:10m  rate=10r/m;
 
    upstream fastapi {
        server api:8000;
        keepalive 32;
    }
 
    upstream minio_backend {
        server minio:9000;
    }
 
    # ── HTTP → HTTPS redirect ──────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
 
    # ── HTTPS main server ─────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;

        server_name _;
 
        ssl_certificate     /etc/nginx/ssl/self-signed.crt;
        ssl_certificate_key /etc/nginx/ssl/self-signed.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
 
        # Security headers
        add_header X-Frame-Options           DENY;
        add_header X-Content-Type-Options    nosniff;
        add_header X-XSS-Protection          "1; mode=block";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains";
 
        # ── REST API ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
 
        # ── WebSocket ────────────────────────────────────────────
        location /ws/ {
            limit_req zone=ws burst=5 nodelay;
            proxy_pass          http://fastapi;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  86400s;  # Keep WS open for 24h
            proxy_send_timeout  86400s;
        }
 
        # ── MinIO presigned-URL proxy ────────────────────────────
        location /minio/ {
            proxy_pass http://minio_backend/;
            proxy_set_header Host minio:9000;
        }
 
        # ── Prometheus /metrics — internal only ──────────────────
        location /metrics {
            allow 172.0.0.0/8;  # Docker internal network
            deny all;
            proxy_pass http://fastapi/metrics;
        }
 
        # ── Health ───────────────────────────────────────────────
        location /health {
            proxy_pass http://fastapi/health;
        }

        # ── Root ─────────────────────────────────────────────────
        location / {
            return 302 https://black-scholes-comparison.vercel.app;
        }
    }
}
