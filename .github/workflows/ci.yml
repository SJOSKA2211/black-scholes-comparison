name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]
  workflow_call:
  workflow_dispatch:
 
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
 
jobs:
 
  # ── Job 1: Backend lint ─────────────────────────────────────────
  lint-backend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install black isort ruff mypy
      - run: black   --check --line-length 100 apps/api/src/
      - run: isort   --check-only --profile black apps/api/src/
      - run: ruff    check apps/api/src/
      - run: pip install -r apps/api/requirements.txt
      - run: mypy    --strict apps/api/src/
 
  # ── Job 2: Frontend lint ─────────────────────────────────────────
  lint-frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - run: cd apps/web && rm -f package-lock.json && npm install
      - run: cd apps/web && npx tsc --noEmit
      - run: cd apps/web && npx eslint . --max-warnings 0
      - run: cd apps/web && npx prettier --check .
 
  # ── Job 3: Unit tests (100% coverage) ───────────────────────────
  unit-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: cd apps/api && pip install -r requirements.txt -r requirements-dev.txt
      - run: |
          cd apps/api
          PYTHONPATH=. pytest tests/unit/ -m unit \
            --cov=src --cov-branch \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=100 \
            -v
      - uses: codecov/codecov-action@v4
        with: { files: apps/api/coverage.xml }
 
  # ── Job 4: Integration tests ─────────────────────────────────────
  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-22.04
    env:
      SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
      REDIS_URL:      redis://localhost:6379/0
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD_TEST }}
      RABBITMQ_URL:   amqp://rabbitmq_user:JKmaish2025@localhost:5672/
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
    services:
      redis:
        image: redis:7.2-alpine
        options: --health-cmd "redis-cli ping" --health-interval 5s
        ports: ["6379:6379"]
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: rabbitmq_user
          RABBITMQ_DEFAULT_PASS: JKmaish2025
        ports: ["5672:5672"]
      minio:
        image: minio/minio:RELEASE.2024-05-01T01-11-10Z
        command: server /data
        env:
          MINIO_ROOT_USER: minio_admin
          MINIO_ROOT_PASSWORD: minio_password
        ports: ["9000:9000"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: cd apps/api && pip install -r requirements.txt -r requirements-dev.txt
      - run: |
          cd apps/api
          PYTHONPATH=. pytest tests/integration/ -m integration \
            --cov=src --cov-branch --cov-append \
            --cov-fail-under=100 -v
 
  # ── Job 5: E2E smoke (Playwright reachability) ───────────────────
  e2e-smoke:
    needs: unit-tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: |
          pip install playwright
          python -m playwright install --with-deps chromium || (sudo apt-get update && sudo apt-get install -y libasound2t64 && python -m playwright install --with-deps chromium)
      - run: |
          python -c "
          import asyncio
          from playwright.async_api import async_playwright
          async def check():
              async with async_playwright() as p:
                  b = await p.chromium.launch(headless=True)
                  pg = await b.new_page()
                  await pg.goto('https://finance.yahoo.com/quote/SPY/options',timeout=20000)
                  await pg.wait_for_selector('table',timeout=15000)
                  await b.close()
                  print('SPY reachable')
          asyncio.run(check())"
 
  # ── Job 6: Docker build ──────────────────────────────────────────
  docker-build:
    needs: [lint-backend, unit-tests]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: false
          load: true
          tags: black-scholes-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: |
          docker run --rm \
            -e SUPABASE_URL=https://smawxojcohoqeqyksuvp.supabase.co \
            -e SUPABASE_KEY=placeholder \
            -e REDIS_URL=redis://localhost:6379/0 \
            black-scholes-api:ci \
            python -c "from src.methods.analytical import BlackScholesAnalytical; print('Import OK')"
 
  # ── Job 7: Frontend unit tests ───────────────────────────────────
  frontend-tests:
    needs: lint-frontend
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - run: cd apps/web && rm -f package-lock.json && npm install
      - run: |
          cd apps/web
          npx vitest run \
            --coverage \
            --coverage.thresholds.lines=100 \
            --coverage.thresholds.branches=100
