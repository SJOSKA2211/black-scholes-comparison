name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  workflow_call:
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd apps/api
          python -m pytest --cov=src
        env:
          supabase_url: https://placeholder.supabase.co
          supabase_key: placeholder-key
          supabase_anon_key: placeholder-anon-key
          grafana_admin_password: placeholder-password

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd apps/web
          npm install
      - name: Lint & Build
        run: |
          cd apps/web
          npm run lint
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder-project.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-build-only

