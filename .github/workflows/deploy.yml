name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
 
jobs:
  full-ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit
 
  e2e-full:
    needs: full-ci
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r apps/api/requirements.txt playwright
      - run: playwright install chromium --with-deps
      - name: Start FastAPI
        run: uvicorn src.main:app --host 0.0.0.0 --port 8000 &
        working-directory: apps/api
        env: { SUPABASE_URL: "${{secrets.SUPABASE_URL}}", SUPABASE_KEY: "${{secrets.SUPABASE_KEY}}" }
      - run: sleep 15
      - run: cd apps/api && pytest tests/e2e/ -m e2e -v --timeout=60
 
  build-push:
    needs: [full-ci, e2e-full]
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: |
            ghcr.io/sjoska2211/black-scholes-api:${{ github.sha }}
            ghcr.io/sjoska2211/black-scholes-api:latest
 
  deploy-frontend:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
