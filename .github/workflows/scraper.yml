name: Scraper
on:
  schedule:
    - cron: "0 6 * * 1-5"   # Mon-Fri 06:00 UTC
  workflow_dispatch:
    inputs:
      market: { required: true, default: spy, type: choice, options: [spy,nse,both] }
      date:   { required: false, default: "" }
 
jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      REDIS_URL:    ${{ secrets.REDIS_URL_PROD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r apps/api/requirements.txt
      - run: |
          pip install playwright
          python -m playwright install --with-deps chromium || (sudo apt-get update && sudo apt-get install -y libasound2t64 && python -m playwright install --with-deps chromium)
      - id: date
        run: |
          D="${{ github.event.inputs.date }}"
          echo "trade_date=${D:-$(date +%F)}" >> $GITHUB_OUTPUT
      - run: |
          cd apps/api
          python -m scripts.collect --market "${{ github.event.inputs.market || 'spy' }}" \
            --date "${{ steps.date.outputs.trade_date }}"
